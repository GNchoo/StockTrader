<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>트레이더 마크 📊 - 로컬 대시보드</title>
<style>
body { font-family: sans-serif; padding: 20px; }
.container { max-width: 1000px; margin: 0 auto; }
h1 { color: #333; }
.status { padding: 10px; margin: 10px 0; border-radius: 5px; }
.success { background: #d4edda; color: #155724; }
.error { background: #f8d7da; color: #721c24; }
.data { background: #f8f9fa; padding: 15px; border-radius: 5px; margin-top: 20px; }
table { width: 100%; border-collapse: collapse; margin-top: 10px; }
th, td { padding: 8px; text-align: left; border-bottom: 1px solid #ddd; }
th { background: #e9ecef; }
.profit { color: green; }
.loss { color: red; }
</style>
</head>
<body>
<div class="container">
  <h1>트레이더 마크 📊 - 로컬 대시보드</h1>
  <div id="status">데이터 로드 중...</div>
  <div id="data" style="display: none;">
    <h3>📊 현재 상태</h3>
    <div id="summary"></div>
    <h3>📈 최근 거래 (10건)</h3>
    <table id="trades">
      <thead><tr><th>시간</th><th>종목</th><th>매매</th><th>가격</th><th>손익</th></tr></thead>
      <tbody></tbody>
    </table>
    <button onclick="loadData()" style="margin-top: 15px; padding: 10px 20px;">새로고침</button>
  </div>
</div>

<script>
// 로컬 파일에서 데이터 직접 로드 (CORS 문제 회피)
async function loadData() {
  try {
    // 1. 로컬 서버 API 호출 시도
    const response = await fetch('http://localhost:8088/api/portfolio');
    if (!response.ok) throw new Error(`HTTP ${response.status}`);
    
    const data = await response.json();
    displayData(data);
    
  } catch (error) {
    document.getElementById('status').className = 'status error';
    document.getElementById('status').innerHTML = `❌ API 오류: ${error.message}<br>
      <small>시도 2: 로컬 파일 직접 읽기</small>`;
    
    // 2. 실패 시 로컬 파일 직접 읽기 시도
    try {
      const fileResponse = await fetch('paper_portfolio.json');
      if (!fileResponse.ok) throw new Error('파일 없음');
      
      const fileData = await fileResponse.json();
      displayData(fileData);
      
    } catch (fileError) {
      document.getElementById('status').className = 'status error';
      document.getElementById('status').innerHTML = `❌ 모든 방법 실패:<br>
        1. API: ${error.message}<br>
        2. 파일: ${fileError.message}<br>
        <br>해결책:<br>
        - 브라우저에서 F12 → Console 탭 확인<br>
        - http://localhost:8088/ 직접 접속<br>
        - 터미널에서: python3 simple_dashboard.py`;
    }
  }
}

function displayData(data) {
  document.getElementById('status').className = 'status success';
  document.getElementById('status').innerHTML = `✅ 데이터 로드 성공 (${data.trade_log?.length || 0}개 거래)`;
  document.getElementById('data').style.display = 'block';
  
  // 요약 정보
  const capital = data.capital || 0;
  const initial = 1000000;
  const returnPct = ((capital - initial) / initial * 100).toFixed(2);
  
  document.getElementById('summary').innerHTML = `
    <p><strong>현재 자본:</strong> ${capital.toLocaleString('ko-KR')}원 (${returnPct >= 0 ? '+' : ''}${returnPct}%)</p>
    <p><strong>마지막 업데이트:</strong> ${data.last_updated || '없음'}</p>
    <p><strong>총 거래:</strong> ${data.trade_log?.length || 0}회</p>
    <p><strong>현재 포지션:</strong> ${Object.keys(data.positions || {}).join(', ') || '없음'}</p>
  `;
  
  // 거래 테이블
  const tbody = document.querySelector('#trades tbody');
  const recent = (data.trade_log || []).slice(-10).reverse();
  
  let html = '';
  recent.forEach(trade => {
    const date = new Date(trade.date);
    const time = `${date.getHours()}:${date.getMinutes().toString().padStart(2,'0')}:${date.getSeconds().toString().padStart(2,'0')}`;
    const profit = trade.profit || 0;
    const profitClass = profit >= 0 ? 'profit' : 'loss';
    const profitText = profit >= 0 ? `+${profit.toFixed(1)}` : profit.toFixed(1);
    
    html += `
      <tr>
        <td>${time}</td>
        <td>${trade.symbol}</td>
        <td>${trade.side === 'BUY' ? '🟢 매수' : '🔴 매도'}</td>
        <td>${trade.price?.toLocaleString('ko-KR') || 0}원</td>
        <td class="${profitClass}">${profitText}원</td>
      </tr>
    `;
  });
  
  tbody.innerHTML = html || '<tr><td colspan="5">거래 내역 없음</td></tr>';
}

// 페이지 로드 시 실행
window.onload = loadData;
</script>
</body>
</html>
