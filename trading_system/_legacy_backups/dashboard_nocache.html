<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>트레이더 마크 📊 - 모의투자 대시보드 (캐시 무시)</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
/* 기존 CSS 동일 */
* { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }
body { background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); color: #e2e8f0; min-height: 100vh; padding: 20px; }
.container { max-width: 1400px; margin: 0 auto; }
.header { text-align: center; margin-bottom: 30px; padding: 20px; background: rgba(30, 41, 59, 0.7); border-radius: 16px; border: 1px solid #334155; }
.header h1 { font-size: 2.5rem; margin-bottom: 10px; color: #60a5fa; }
.header .subtitle { font-size: 1.1rem; color: #94a3b8; margin-bottom: 15px; }
.header .timestamp { font-size: 0.9rem; color: #64748b; background: rgba(15, 23, 42, 0.5); padding: 8px 16px; border-radius: 20px; display: inline-block; }
.kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; margin-bottom: 30px; }
.kpi-card { background: rgba(30, 41, 59, 0.8); border-radius: 12px; padding: 20px; border: 1px solid #334155; transition: transform 0.2s; }
.kpi-card:hover { transform: translateY(-2px); border-color: #60a5fa; }
.kpi-card .label { font-size: 0.9rem; color: #94a3b8; margin-bottom: 8px; }
.kpi-card .value { font-size: 2rem; font-weight: 700; }
.kpi-card .change { font-size: 0.9rem; margin-top: 5px; }
.kpi-card .change.positive { color: #4ade80; }
.kpi-card .change.negative { color: #f87171; }
.chart-container { background: rgba(30, 41, 59, 0.8); border-radius: 12px; padding: 20px; margin-bottom: 30px; border: 1px solid #334155; }
.chart-title { font-size: 1.2rem; margin-bottom: 15px; color: #60a5fa; }
#capitalChart { height: 300px; width: 100%; }
.table-container { background: rgba(30, 41, 59, 0.8); border-radius: 12px; padding: 20px; border: 1px solid #334155; overflow-x: auto; }
.table-title { font-size: 1.2rem; margin-bottom: 15px; color: #60a5fa; }
table { width: 100%; border-collapse: collapse; }
th { text-align: left; padding: 12px 15px; background: rgba(15, 23, 42, 0.5); color: #94a3b8; font-weight: 600; border-bottom: 1px solid #334155; }
td { padding: 12px 15px; border-bottom: 1px solid #334155; }
tr:hover { background: rgba(56, 189, 248, 0.1); }
.profit { color: #4ade80; }
.loss { color: #f87171; }
.status-badge { display: inline-block; padding: 4px 10px; border-radius: 12px; font-size: 0.8rem; font-weight: 600; }
.status-badge.buy { background: rgba(74, 222, 128, 0.2); color: #4ade80; }
.status-badge.sell { background: rgba(248, 113, 113, 0.2); color: #f87171; }
.status-badge.hold { background: rgba(148, 163, 184, 0.2); color: #94a3b8; }
.footer { text-align: center; margin-top: 30px; padding: 20px; color: #64748b; font-size: 0.9rem; }
.loading { text-align: center; padding: 40px; color: #94a3b8; }
.loading i { font-size: 2rem; margin-bottom: 10px; color: #60a5fa; }
@media (max-width: 768px) {
  .kpi-grid { grid-template-columns: repeat(2, 1fr); }
  .header h1 { font-size: 2rem; }
}
@media (max-width: 480px) {
  .kpi-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1><i class="fas fa-chart-line"></i> 트레이더 마크 📊 - 모의투자 대시보드</h1>
    <div class="subtitle">실시간 모의투자 성과 모니터링 (캐시 무시 버전)</div>
    <div class="timestamp" id="timestamp">로딩 중...</div>
  </div>

  <div class="kpi-grid" id="kpiGrid">
    <div class="kpi-card">
      <div class="label"><i class="fas fa-wallet"></i> 현재 자본</div>
      <div class="value" id="capital">-</div>
      <div class="change" id="capitalChange">-</div>
    </div>
    <div class="kpi-card">
      <div class="label"><i class="fas fa-percentage"></i> 누적 수익률</div>
      <div class="value" id="returnRate">-</div>
      <div class="change" id="returnChange">-</div>
    </div>
    <div class="kpi-card">
      <div class="label"><i class="fas fa-exchange-alt"></i> 총 거래 횟수</div>
      <div class="value" id="tradeCount">-</div>
      <div class="change">오늘: <span id="todayTrades">-</span>회</div>
    </div>
    <div class="kpi-card">
      <div class="label"><i class="fas fa-trophy"></i> 승률</div>
      <div class="value" id="winRate">-</div>
      <div class="change">수익 거래: <span id="winTrades">-</span>회</div>
    </div>
    <div class="kpi-card">
      <div class="label"><i class="fas fa-coins"></i> 총 수수료</div>
      <div class="value" id="totalFee">-</div>
      <div class="change">평균: <span id="avgFee">-</span>원/거래</div>
    </div>
  </div>

  <div class="chart-container">
    <div class="chart-title"><i class="fas fa-chart-line"></i> 자본 곡선</div>
    <canvas id="capitalChart"></canvas>
  </div>

  <div class="table-container">
    <div class="chart-title"><i class="fas fa-history"></i> 최근 거래 내역 (최근 20건)</div>
    <table id="tradeTable">
      <thead>
        <tr>
          <th>시간</th>
          <th>종목</th>
          <th>매매</th>
          <th>가격</th>
          <th>수량</th>
          <th>손익</th>
          <th>사유</th>
        </tr>
      </thead>
      <tbody id="tradeTableBody">
        <tr><td colspan="7" class="loading">데이터 로딩 중...</td></tr>
      </tbody>
    </table>
  </div>

  <div class="footer">
    <p>트레이더 마크 📊 모의투자 시스템 | 데이터 업데이트: <span id="lastUpdated">-</span></p>
    <p>이 대시보드는 30초마다 자동 새로고침됩니다. <button onclick="location.reload(true)">강력 새로고침</button></p>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
let capitalChart = null;
let lastUpdateTime = null;

async function loadData() {
  try {
    console.log('🔄 데이터 로드 시작 (캐시 무시)', new Date().toLocaleTimeString());
    
    // 캐시 무시를 위해 타임스탬프 추가
    const timestamp = new Date().getTime();
    const response = await fetch(`/api/portfolio?t=${timestamp}`, {
      headers: {
        'Cache-Control': 'no-cache, no-store, must-revalidate',
        'Pragma': 'no-cache',
        'Expires': '0'
      }
    });
    
    if (!response.ok) {
      throw new Error(`API 오류: ${response.status}`);
    }
    
    const data = await response.json();
    console.log('✅ 데이터 로드 완료:', data.last_updated);
    
    // 데이터 업데이트
    updateKPIs(data);
    updateChart(data);
    updateTradeTable(data);
    updateTimestamp(data);
    
    return data;
  } catch (error) {
    console.error('❌ 데이터 로드 실패:', error);
    document.getElementById('timestamp').innerHTML = `<span style="color: #f87171;">오류: ${error.message}</span>`;
    return null;
  }
}

function updateKPIs(data) {
  // 자본
  const capital = data.capital;
  const initialCapital = 1000000;
  const totalReturn = ((capital - initialCapital) / initialCapital * 100).toFixed(2);
  
  document.getElementById('capital').textContent = capital.toLocaleString('ko-KR') + '원';
  document.getElementById('capitalChange').textContent = `${totalReturn >= 0 ? '+' : ''}${totalReturn}%`;
  document.getElementById('capitalChange').className = `change ${totalReturn >= 0 ? 'positive' : 'negative'}`;
  
  // 수익률
  const dailyLog = data.daily_log || [];
  let totalReturnRate = 0;
  if (dailyLog.length > 0) {
    totalReturnRate = dailyLog[dailyLog.length - 1].total_return || 0;
  }
  document.getElementById('returnRate').textContent = totalReturnRate.toFixed(2) + '%';
  document.getElementById('returnChange').textContent = totalReturnRate >= 0 ? '📈 상승 중' : '📉 하락 중';
  document.getElementById('returnChange').className = `change ${totalReturnRate >= 0 ? 'positive' : 'negative'}`;
  
  // 거래 횟수
  const tradeLog = data.trade_log || [];
  const today = new Date().toISOString().split('T')[0];
  const todayTrades = tradeLog.filter(t => t.date.startsWith(today)).length;
  
  document.getElementById('tradeCount').textContent = tradeLog.length + '회';
  document.getElementById('todayTrades').textContent = todayTrades;
  
  // 승률
  const profitableTrades = tradeLog.filter(t => t.profit > 0).length;
  const winRate = tradeLog.length > 0 ? (profitableTrades / tradeLog.length * 100).toFixed(1) : 0;
  
  document.getElementById('winRate').textContent = winRate + '%';
  document.getElementById('winTrades').textContent = profitableTrades;
  
  // 수수료
  let totalFee = 0;
  tradeLog.forEach(t => {
    if (t.total_fee) totalFee += t.total_fee;
    else if (t.buy_fee && t.sell_fee) totalFee += (t.buy_fee + t.sell_fee);
  });
  
  document.getElementById('totalFee').textContent = Math.round(totalFee).toLocaleString('ko-KR') + '원';
  document.getElementById('avgFee').textContent = tradeLog.length > 0 ? Math.round(totalFee / tradeLog.length) : 0;
}

function updateChart(data) {
  const ctx = document.getElementById('capitalChart').getContext('2d');
  const tradeLog = data.trade_log || [];
  
  // 거래별 자본 변화 계산
  let capitalData = [1000000]; // 초기 자본
  let labels = ['시작'];
  
  let runningCapital = 1000000;
  tradeLog.forEach((trade, index) => {
    if (trade.profit !== undefined) {
      runningCapital += trade.profit;
      capitalData.push(runningCapital);
      
      const time = trade.date.split('T')[1].substring(0, 8);
      labels.push(`${time}`);
    }
  });
  
  if (capitalChart) {
    capitalChart.destroy();
  }
  
  capitalChart = new Chart(ctx, {
    type: 'line',
    data: {
      labels: labels,
      datasets: [{
        label: '자본 변화',
        data: capitalData,
        borderColor: '#60a5fa',
        backgroundColor: 'rgba(96, 165, 250, 0.1)',
        borderWidth: 2,
        fill: true,
        tension: 0.1
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            label: (context) => `자본: ${context.parsed.y.toLocaleString('ko-KR')}원`
          }
        }
      },
      scales: {
        x: {
          grid: { color: 'rgba(148, 163, 184, 0.1)' },
          ticks: { color: '#94a3b8' }
        },
        y: {
          grid: { color: 'rgba(148, 163, 184, 0.1)' },
          ticks: { 
            color: '#94a3b8',
            callback: (value) => value.toLocaleString('ko-KR') + '원'
          }
        }
      }
    }
  });
}

function updateTradeTable(data) {
  const tbody = document.getElementById('tradeTableBody');
  const tradeLog = data.trade_log || [];
  const recentTrades = tradeLog.slice(-20).reverse(); // 최근 20개, 최신순
  
  if (recentTrades.length === 0) {
    tbody.innerHTML = '<tr><td colspan="7">거래 내역이 없습니다.</td></tr>';
    return;
  }
  
  let html = '';
  recentTrades.forEach(trade => {
    const date = new Date(trade.date);
    const timeStr = `${date.getHours().toString().padStart(2, '0')}:${date.getMinutes().toString().padStart(2, '0')}:${date.getSeconds().toString().padStart(2, '0')}`;
    
    const sideClass = trade.side === 'BUY' ? 'buy' : 'sell';
    const sideText = trade.side === 'BUY' ? '매수' : '매도';
    
    const profit = trade.profit || 0;
    const profitClass = profit >= 0 ? 'profit' : 'loss';
    const profitText = profit >= 0 ? `+${profit.toFixed(1)}` : profit.toFixed(1);
    
    html += `
      <tr>
        <td>${timeStr}</td>
        <td>${trade.symbol}</td>
        <td><span class="status-badge ${sideClass}">${sideText}</span></td>
        <td>${trade.price.toLocaleString('ko-KR')}원</td>
        <td>${trade.volume?.toFixed(6) || '-'}</td>
        <td class="${profitClass}">${profitText}원</td>
        <td>${trade.reason || 'AI'}</td>
      </tr>
    `;
  });
  
  tbody.innerHTML = html;
}

function updateTimestamp(data) {
  const lastUpdated = new Date(data.last_updated);
  const now = new Date();
  const diffMs = now - lastUpdated;
  const diffSec = Math.floor(diffMs / 1000);
  const diffMin = Math.floor(diffSec / 60);
  
  let timeText;
  if (diffSec < 60) {
    timeText = `${diffSec}초 전`;
  } else if (diffMin < 60) {
    timeText = `${diffMin}분 전`;
  } else {
    timeText = lastUpdated.toLocaleTimeString('ko-KR');
  }
  
  document.getElementById('timestamp').textContent = `마지막 업데이트: ${timeText}`;
  document.getElementById('lastUpdated').textContent = lastUpdated.toLocaleString('ko-KR');
}

// 초기 로드
console.log('🚀 대시보드 시작 (캐시 무시 버
