<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>트레이더 마크 📊 - 테스트 대시보드</title>
<style>
body { font-family: sans-serif; padding: 20px; background: #f0f0f0; }
.container { max-width: 800px; margin: 0 auto; background: white; padding: 20px; border-radius: 10px; }
h1 { color: #333; }
.status { padding: 10px; margin: 10px 0; border-radius: 5px; }
.success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
.error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
.loading { background: #fff3cd; color: #856404; border: 1px solid #ffeaa7; }
.data { background: #e9ecef; padding: 15px; border-radius: 5px; margin-top: 20px; }
pre { background: #2d3748; color: #e2e8f0; padding: 15px; border-radius: 5px; overflow: auto; }
button { padding: 10px 20px; background: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; }
button:hover { background: #0056b3; }
</style>
</head>
<body>
<div class="container">
  <h1>트레이더 마크 📊 - 테스트 대시보드</h1>
  
  <div id="status1" class="status loading">1. API 연결 테스트 중...</div>
  <div id="status2" class="status loading">2. 데이터 로드 테스트 중...</div>
  <div id="status3" class="status loading">3. JavaScript 실행 테스트 중...</div>
  
  <div id="data" class="data" style="display: none;">
    <h3>📊 현재 모의투자 상태</h3>
    <div id="summary"></div>
    <h3>📈 최근 거래 (최근 5건)</h3>
    <div id="recentTrades"></div>
    <button onclick="loadData()">새로고침</button>
  </div>
  
  <div style="margin-top: 30px;">
    <h3>🔧 문제 해결</h3>
    <p>문제가 있다면:</p>
    <ol>
      <li>브라우저 콘솔(F12)에서 오류 확인</li>
      <li>Ctrl+F5로 강력 새로고침</li>
      <li>다른 브라우저로 시도</li>
      <li>로컬 URL: <a href="http://localhost:8088/" target="_blank">http://localhost:8088/</a></li>
    </ol>
  </div>
</div>

<script>
async function testAPI() {
  try {
    const response = await fetch('/api/portfolio');
    document.getElementById('status1').className = 'status success';
    document.getElementById('status1').innerHTML = '✅ 1. API 연결 성공';
    
    const data = await response.json();
    document.getElementById('status2').className = 'status success';
    document.getElementById('status2').innerHTML = `✅ 2. 데이터 로드 성공 (${data.trade_log?.length || 0}개 거래)`;
    
    // 데이터 표시
    document.getElementById('data').style.display = 'block';
    
    // 요약 정보
    const summary = `
      <p><strong>현재 자본:</strong> ${data.capital?.toLocaleString('ko-KR') || 0}원</p>
      <p><strong>마지막 업데이트:</strong> ${data.last_updated || '없음'}</p>
      <p><strong>총 거래 횟수:</strong> ${data.trade_log?.length || 0}회</p>
      <p><strong>현재 포지션:</strong> ${Object.keys(data.positions || {}).join(', ') || '없음'}</p>
    `;
    document.getElementById('summary').innerHTML = summary;
    
    // 최근 거래
    const recentTrades = data.trade_log?.slice(-5).reverse() || [];
    let tradesHTML = '<table style="width:100%; border-collapse:collapse;">';
    tradesHTML += '<tr><th>시간</th><th>종목</th><th>매매</th><th>가격</th><th>손익</th></tr>';
    
    recentTrades.forEach(trade => {
      const date = new Date(trade.date);
      const time = `${date.getHours()}:${date.getMinutes().toString().padStart(2,'0')}:${date.getSeconds().toString().padStart(2,'0')}`;
      const profit = trade.profit || 0;
      const profitColor = profit >= 0 ? 'green' : 'red';
      
      tradesHTML += `
        <tr>
          <td>${time}</td>
          <td>${trade.symbol}</td>
          <td>${trade.side === 'BUY' ? '🟢 매수' : '🔴 매도'}</td>
          <td>${trade.price?.toLocaleString('ko-KR') || 0}원</td>
          <td style="color:${profitColor}">${profit >= 0 ? '+' : ''}${profit.toFixed(1)}원</td>
        </tr>
      `;
    });
    
    tradesHTML += '</table>';
    document.getElementById('recentTrades').innerHTML = tradesHTML;
    
    document.getElementById('status3').className = 'status success';
    document.getElementById('status3').innerHTML = '✅ 3. JavaScript 실행 성공';
    
  } catch (error) {
    document.getElementById('status1').className = 'status error';
    document.getElementById('status1').innerHTML = `❌ 1. API 연결 실패: ${error.message}`;
    
    document.getElementById('status3').className = 'status error';
    document.getElementById('status3').innerHTML = '❌ 3. JavaScript 실행 실패';
    
    console.error('테스트 오류:', error);
  }
}

// 페이지 로드 시 테스트 실행
window.onload = testAPI;

// 수동 새로고침 함수
async function loadData() {
  document.getElementById('status1').className = 'status loading';
  document.getElementById('status1').innerHTML = '1. API 연결 테스트 중...';
  document.getElementById('status2').className = 'status loading';
  document.getElementById('status2').innerHTML = '2. 데이터 로드 테스트 중...';
  
  await testAPI();
}
</script>
</body>
</html>
